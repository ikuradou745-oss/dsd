<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forcord - Next Gen</title>
  <style>
    /* ========== ベーススタイル & 変数 ========== */
    :root {
      --bg-color: #202225;
      --nav-bg: #2f3136;
      --panel-bg: #36393f;
      --text-main: #dcddde;
      --text-muted: #72767d;
      --neon-blue: #00f3ff;
      --neon-pink: #ff00ea;
      --neon-green: #39ff14;
      --neon-red: #ff3333;
      --btn-bg: #5865F2;
      --btn-hover: #4752C4;
      --border-color: #4f545c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }
    button { cursor: pointer; border: none; outline: none; border-radius: 4px; font-weight: bold; transition: all 0.2s; }
    input, select { background-color: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; outline: none; }
    input:focus { border-color: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: #4f545c; border-radius: 4px; }

    /* ========== ユーティリティ ========== */
    .hidden { display: none !important; }
    .neon-text { text-shadow: 0 0 5px var(--neon-blue), 0 0 10px var(--neon-blue); color: #fff; }
    .neon-btn { background-color: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 5px var(--neon-blue) inset, 0 0 5px var(--neon-blue); padding: 8px 16px; }
    .neon-btn:hover { background-color: var(--neon-blue); color: #000; }
    .danger-btn { background-color: var(--neon-red); color: #fff; padding: 6px 12px; }
    .primary-btn { background-color: var(--btn-bg); color: white; padding: 10px 20px; }

    /* ========== 初回ログイン画面 ========== */
    #init-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .init-box { background-color: var(--panel-bg); padding: 40px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,243,255,0.2); text-align: center; width: 400px; border: 1px solid var(--neon-blue); }

    /* ========== サイドバー ========== */
    #sidebar { width: 70px; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; border-right: 1px solid var(--border-color); }
    .nav-item { width: 50px; height: 50px; border-radius: 50%; background-color: var(--panel-bg); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; position: relative; }
    .nav-item:hover, .nav-item.active { border-radius: 16px; background-color: var(--neon-blue); color: #000; }

    /* ========== つながる画面 (Discovery) ========== */
    #connect-view { display: flex; height: 100%; }
    .connect-left { flex: 1; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px; }
    .connect-right { flex: 1; padding: 20px; display: flex; flex-direction: column; background-color: rgba(0,0,0,0.1); }
    .user-card { background: var(--bg-color); padding: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border: 1px solid var(--border-color); }
    .user-list-scroll { flex: 1; overflow-y: auto; padding-right: 5px; }

    /* ========== チャット吹き出しスタイル (共通) ========== */
    .msg-row { display: flex; width: 100%; margin-bottom: 15px; }
    .msg-row.self { justify-content: flex-start; }
    .msg-row.other { justify-content: flex-end; }
    .message-block { display: flex; max-width: 80%; gap: 10px; }
    .msg-row.other .message-block { flex-direction: row-reverse; }
    .msg-bubble { padding: 10px 15px; border-radius: 12px; font-size: 16px; font-weight: bold; color: #000; word-break: break-all; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .msg-row.self .msg-bubble { background-color: var(--neon-green); }
    .msg-row.other .msg-bubble { background-color: #ffffff; }
    .msg-icon { font-size: 32px; min-width: 40px; text-align: center; }

    /* ========== ボイスチャット画面 ========== */
    #voice-view { display: flex; flex-direction: column; height: 100%; }
    .vc-room { display: flex; flex: 1; overflow: hidden; }
    .vc-sidebar { width: 250px; background-color: var(--nav-bg); border-right: 1px solid var(--border-color); padding: 20px; }
    .vc-main { flex: 1; display: flex; flex-direction: column; }
    .vc-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background-color: #23272a; }
    .vc-controls { height: 80px; background-color: var(--nav-bg); display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 1px solid var(--border-color); }
    .vc-setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; }

    /* ========== 設定画面 ========== */
    #settings-view { padding: 30px; overflow-y: auto; }
    .settings-group { background-color: var(--nav-bg); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .icon-selector { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin-top: 10px; }
    .icon-option { font-size: 24px; cursor: pointer; padding: 5px; text-align: center; border-radius: 4px; }
    .icon-option.selected { border: 2px solid var(--neon-blue); background: rgba(0,243,255,0.1); }
    .setting-row { display: flex; align-items: center; margin-bottom: 12px; }
    .setting-row label { width: 140px; font-size: 14px; }
    .setting-row input[type="range"] { flex: 1; accent-color: var(--neon-blue); }

    #content-area { flex: 1; position: relative; background-color: var(--panel-bg); }
    .view-section { width: 100%; height: 100%; display: flex; flex-direction: column; }
  </style>
</head>
<body>

  <div id="init-screen">
    <div class="init-box">
      <h1 class="neon-text">Forcord</h1>
      <input type="text" id="init-name" placeholder="名前を入力" maxlength="15" style="width:100%; margin: 20px 0;">
      <button class="neon-btn" style="width: 100%;" onclick="appController.registerUser()">開始する</button>
    </div>
  </div>

  <div id="main-app" class="hidden">
    <div id="sidebar">
      <div class="nav-item active" onclick="appController.switchView('home')">🏠</div>
      <div class="nav-item" onclick="appController.switchView('connect')">🌐</div>
      <div class="nav-item" onclick="appController.switchView('message')">💬</div>
      <div class="nav-item" onclick="appController.switchView('voice')">🎙️</div>
      <div class="nav-item" onclick="appController.switchView('settings')">⚙️</div>
    </div>

    <div id="content-area">
      <div id="home-view" class="view-section">
        <div style="padding:40px; display:flex; gap:40px;">
          <div style="flex:1">
            <h2 class="section-header neon-text">プロフィール</h2>
            <div style="background:var(--nav-bg); padding:30px; border-radius:15px; margin-top:20px; text-align:center;">
              <div id="profile-icon-display" style="font-size:80px;">😀</div>
              <div id="profile-name-display" style="font-size:32px; font-weight:bold; margin:10px 0;">名前</div>
              <div id="profile-code-display" style="color:var(--neon-green);">コード: --------</div>
            </div>
          </div>
          <div style="flex:1">
            <h2 class="section-header neon-text">フレンドリスト</h2>
            <div id="home-friend-list" class="user-list-scroll" style="margin-top:20px;"></div>
          </div>
        </div>
      </div>

      <div id="connect-view" class="view-section hidden">
        <div class="connect-left">
          <h2 class="neon-text" style="margin-bottom:20px;">今日ログインした人</h2>
          <div id="discovery-list" class="user-list-scroll"></div>
        </div>
        <div class="connect-right">
          <h2 class="neon-text" style="margin-bottom:20px; color:var(--neon-pink);">あなたとつながりたい人！</h2>
          <div id="request-list" class="user-list-scroll"></div>
        </div>
      </div>

      <div id="message-view" class="view-section hidden" style="flex-direction:row;">
        <div style="width:300px; border-right:1px solid var(--border-color); background:var(--nav-bg);">
          <div style="padding:20px; font-weight:bold; border-bottom:1px solid var(--border-color);">チャット</div>
          <div id="chat-list-container" class="user-list-scroll"></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column;">
          <div id="chat-header" style="padding:15px; border-bottom:1px solid var(--border-color); font-weight:bold;">選択してください</div>
          <div id="message-history" style="flex:1; overflow-y:auto; padding:20px;"></div>
          <div style="padding:20px; display:flex; gap:10px; background:var(--nav-bg);">
            <input type="text" id="message-input" style="flex:1" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') appController.sendMessage()">
            <button class="primary-btn" onclick="appController.sendMessage()">送信</button>
          </div>
        </div>
      </div>

      <div id="voice-view" class="view-section hidden">
        <div id="vc-setup-area" class="vc-setup">
          <h2 class="neon-text">ボイスチャットを開始</h2>
          <div style="width:400px; background:var(--nav-bg); padding:20px; border-radius:10px;">
            <h3>フレンドを招待</h3>
            <div id="vc-online-friends" style="max-height:200px; overflow-y:auto; margin:15px 0;"></div>
            <button class="primary-btn" style="width:100%" onclick="appController.createVoiceRoom()">部屋を作成</button>
          </div>
        </div>
        <div id="vc-room-area" class="vc-room hidden">
          <div class="vc-sidebar">
            <h3 class="neon-text">参加者</h3>
            <div id="vc-member-list" style="margin-top:15px;"></div>
          </div>
          <div class="vc-main">
            <div id="vc-history-log" class="vc-history"></div>
            <div class="vc-controls">
              <button id="mic-toggle-btn" class="primary-btn" onclick="appController.toggleMic()">🎤 マイク ON</button>
              <button class="danger-btn" onclick="appController.leaveVoiceRoom()">退室</button>
            </div>
          </div>
        </div>
      </div>

      <div id="settings-view" class="view-section hidden">
        <h2 class="neon-text">設定</h2>
        <div class="settings-group">
          <h3>プロフィール</h3>
          <div class="icon-selector" id="icon-selector-container"></div>
        </div>
        <div class="settings-group">
          <h3>あなたの声の設定 (リアルタイム反映)</h3>
          <div id="voice-sliders"></div>
          <button class="neon-btn" style="margin-top:15px;" onclick="appController.testVoice()">テスト再生</button>
        </div>
      </div>
    </div>
  </div>

  <div id="invitation-toast" style="position:fixed; top:20px; left:20px; background:var(--panel-bg); border:2px solid var(--neon-blue); padding:20px; border-radius:8px; z-index:9999;" class="hidden">
    <div id="invitation-text" style="margin-bottom:10px; font-weight:bold;"></div>
    <div style="display:flex; gap:10px;">
      <button class="primary-btn" onclick="appController.acceptInvitation()">参加</button>
      <button class="danger-btn" onclick="appController.declineInvitation()">拒否</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, push, remove, update, onDisconnect, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcds20u1-6-nk7710P4xddsa-m1wDL0TQ",
      authDomain: "iikotowaruikoto-d5aa7.firebaseapp.com",
      databaseURL: "https://iikotowaruikoto-d5aa7-default-rtdb.firebaseio.com",
      projectId: "iikotowaruikoto-d5aa7",
      storageBucket: "iikotowaruikoto-d5aa7.firebasestorage.app",
      messagingSenderId: "455780219216",
      appId: "1:455780219216:web:225461fcf24c1a46f69455"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ICONS = ["😀","😎","🤔","🐱","🦊","🤖","👻","👽","🦖","🐼"];
    const VOICE_PARAMS = [
      { id: "pitch", name: "音の高さ (Pitch)", min: 0.1, max: 2.0, step: 0.1 },
      { id: "rate", name: "話す速度 (Rate)", min: 0.5, max: 2.0, step: 0.1 },
      { id: "volume", name: "音量 (Volume)", min: 0.0, max: 1.0, step: 0.1 }
    ];

    const state = {
      userId: null,
      userData: null,
      friends: [],
      currentChatId: null,
      voiceRoomId: null,
      isMicOn: true,
      recognition: null,
      usersCache: {},
      lastSpokenId: null
    };

    const appController = {
      init: async () => {
        let savedId = localStorage.getItem('forcord_uid');
        if (savedId) {
          const snap = await get(ref(db, `users/${savedId}`));
          if (snap.exists()) {
            state.userId = savedId;
            state.userData = snap.val();
            appController.launch();
            return;
          }
        }
        document.getElementById('init-screen').classList.remove('hidden');
      },

      registerUser: async () => {
        const name = document.getElementById('init-name').value.trim();
        if (!name) return;
        const uid = 'u' + Date.now();
        const data = {
          name,
          icon: ICONS[0],
          friendCode: Math.random().toString(36).substring(2, 10),
          voiceSettings: { pitch: 1.0, rate: 1.0, volume: 1.0 },
          lastLogin: serverTimestamp()
        };
        await set(ref(db, `users/${uid}`), data);
        localStorage.setItem('forcord_uid', uid);
        state.userId = uid;
        state.userData = data;
        appController.launch();
      },

      launch: () => {
        document.getElementById('init-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        
        // ログイン時刻を更新
        update(ref(db, `users/${state.userId}`), { lastLogin: serverTimestamp() });
        
        appController.initUI();
        appController.startListeners();
        appController.switchView('home');
      },

      initUI: () => {
        // 設定のスライダー生成 & リアルタイム保存
        const sliderCont = document.getElementById('voice-sliders');
        VOICE_PARAMS.forEach(p => {
          const val = state.userData.voiceSettings[p.id];
          const row = document.createElement('div');
          row.className = 'setting-row';
          row.innerHTML = `
            <label>${p.name}</label>
            <input type="range" id="s-${p.id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
            <span id="v-${p.id}" style="width:30px; text-align:right;">${val}</span>
          `;
          const input = row.querySelector('input');
          input.oninput = (e) => {
            const newVal = parseFloat(e.target.value);
            document.getElementById(`v-${p.id}`).innerText = newVal;
            state.userData.voiceSettings[p.id] = newVal;
            // スライダーを動かすたびにFirebaseを即座に更新 (リアルタイム)
            update(ref(db, `users/${state.userId}/voiceSettings`), { [p.id]: newVal });
          };
          sliderCont.appendChild(row);
        });

        // アイコン選択
        const iconCont = document.getElementById('icon-selector-container');
        ICONS.forEach(icon => {
          const div = document.createElement('div');
          div.className = `icon-option ${state.userData.icon === icon ? 'selected' : ''}`;
          div.innerText = icon;
          div.onclick = () => {
            document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            state.userData.icon = icon;
            update(ref(db, `users/${state.userId}`), { icon });
            appController.updateProfileUI();
          };
          iconCont.appendChild(div);
        });

        // 音声認識の初期化
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (window.SpeechRecognition) {
          state.recognition = new window.SpeechRecognition();
          state.recognition.lang = 'ja-JP';
          state.recognition.continuous = true;
          state.recognition.onresult = (e) => {
            if (!state.isMicOn || !state.voiceRoomId) return;
            const text = e.results[e.results.length - 1][0].transcript;
            if (text.trim()) appController.sendVoiceLog(text);
          };
          state.recognition.onend = () => { if (state.isMicOn && state.voiceRoomId) state.recognition.start(); };
        }
      },

      startListeners: () => {
        // フレンドリスト監視
        onValue(ref(db, `friendships/${state.userId}`), async (snap) => {
          const list = document.getElementById('home-friend-list');
          list.innerHTML = '';
          state.friends = snap.exists() ? Object.keys(snap.val()) : [];
          for (const fid of state.friends) {
            const fData = await appController.getUser(fid);
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `<span>${fData.icon} ${fData.name}</span><button class="danger-btn" onclick="appController.removeFriend('${fid}')">削除</button>`;
            list.appendChild(div);
          }
        });

        // 「つながりたい！」のリクエスト監視
        onValue(ref(db, `connectRequests/${state.userId}`), async (snap) => {
          const list = document.getElementById('request-list');
          list.innerHTML = '';
          if (snap.exists()) {
            for (const [rid, req] of Object.entries(snap.val())) {
              const div = document.createElement('div');
              div.className = 'user-card';
              div.innerHTML = `
                <span>${req.icon} ${req.name} さんから申請！</span>
                <div>
                  <button class="primary-btn" style="padding:4px 8px" onclick="appController.handleRequest('${rid}', true)">許可</button>
                  <button class="danger-btn" style="padding:4px 8px" onclick="appController.handleRequest('${rid}', false)">拒否</button>
                </div>
              `;
              list.appendChild(div);
            }
          } else {
            list.innerHTML = '<p style="color:var(--text-muted)">まだリクエストはありません</p>';
          }
        });

        // チャットリスト監視
        onValue(ref(db, 'chats'), async (snap) => {
          const cont = document.getElementById('chat-list-container');
          cont.innerHTML = '';
          if (!snap.exists()) return;
          for (const [cid, chat] of Object.entries(snap.val())) {
            if (chat.members[state.userId]) {
              const otherId = Object.keys(chat.members).find(id => id !== state.userId);
              const otherData = await appController.getUser(otherId);
              const div = document.createElement('div');
              div.style.padding = '15px';
              div.style.cursor = 'pointer';
              div.style.borderBottom = '1px solid var(--border-color)';
              div.innerHTML = `${otherData.icon} ${otherData.name}`;
              div.onclick = () => appController.openChat(cid, otherData.name);
              cont.appendChild(div);
            }
          }
        });

        // 招待通知
        onValue(ref(db, `invitations/${state.userId}`), async (snap) => {
          if (!snap.exists()) { document.getElementById('invitation-toast').classList.add('hidden'); return; }
          const inv = Object.values(snap.val())[0];
          const invKey = Object.keys(snap.val())[0];
          const fromUser = await appController.getUser(inv.from);
          state.activeInv = { key: invKey, ...inv };
          document.getElementById('invitation-text').innerText = `${fromUser.name}からボイチャ招待！`;
          document.getElementById('invitation-toast').classList.remove('hidden');
        });
      },

      switchView: (viewId) => {
        document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
        document.getElementById(`${viewId}-view`).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        
        if (viewId === 'home') appController.updateProfileUI();
        if (viewId === 'connect') appController.loadConnectView();
        if (viewId === 'voice' && !state.voiceRoomId) appController.loadVoiceSetup();
      },

      updateProfileUI: () => {
        document.getElementById('profile-icon-display').innerText = state.userData.icon;
        document.getElementById('profile-name-display').innerText = state.userData.name;
        document.getElementById('profile-code-display').innerText = `コード: ${state.userData.friendCode}`;
      },

      // --- つながる機能 ---
      loadConnectView: async () => {
        const list = document.getElementById('discovery-list');
        list.innerHTML = '読み込み中...';
        const snap = await get(ref(db, 'users'));
        list.innerHTML = '';
        const now = Date.now();
        const oneDay = 24 * 60 * 60 * 1000;

        snap.forEach(child => {
          const u = child.val();
          const uid = child.key;
          // 自分以外かつ、今日ログインした人（簡易的に24時間以内）
          if (uid !== state.userId && (now - u.lastLogin) < oneDay) {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `
              <span>${u.icon} ${u.name}</span>
              <button class="neon-btn" onclick="appController.sendConnectRequest('${uid}')">つながる</button>
            `;
            list.appendChild(div);
          }
        });
      },

      sendConnectRequest: async (targetUid) => {
        await set(ref(db, `connectRequests/${targetUid}/${state.userId}`), {
          name: state.userData.name,
          icon: state.userData.icon,
          timestamp: serverTimestamp()
        });
        alert("リクエストを送信しました！");
      },

      handleRequest: async (fromUid, accept) => {
        await remove(ref(db, `connectRequests/${state.userId}/${fromUid}`));
        if (accept) {
          // フレンド成立
          await update(ref(db, `friendships/${state.userId}`), { [fromUid]: true });
          await update(ref(db, `friendships/${fromUid}`), { [state.userId]: true });
          // ダイレクトチャット作成
          const chatId = push(ref(db, 'chats')).key;
          await set(ref(db, `chats/${chatId}`), {
            members: { [state.userId]: true, [fromUid]: true },
            timestamp: serverTimestamp()
          });
          alert("フレンドになりました！");
        }
      },

      // --- チャット ---
      openChat: (cid, title) => {
        state.currentChatId = cid;
        document.getElementById('chat-header').innerText = title;
        const msgRef = query(ref(db, `chats/${cid}/messages`), limitToLast(50));
        onValue(msgRef, async (snap) => {
          const hist = document.getElementById('message-history');
          hist.innerHTML = '';
          if (!snap.exists()) return;
          for (const m of Object.values(snap.val())) {
            const sender = await appController.getUser(m.sender);
            const isSelf = m.sender === state.userId;
            const row = document.createElement('div');
            row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
            row.innerHTML = `
              <div class="message-block">
                <div class="msg-icon">${sender.icon}</div>
                <div class="msg-bubble">${m.text}</div>
              </div>
            `;
            hist.appendChild(row);
          }
          hist.scrollTop = hist.scrollHeight;
        });
      },

      sendMessage: async () => {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text || !state.currentChatId) return;
        await push(ref(db, `chats/${state.currentChatId}/messages`), {
          sender: state.userId,
          text,
          timestamp: serverTimestamp()
        });
        input.value = '';
      },

      // --- ボイスチャット (履歴保存版) ---
      loadVoiceSetup: async () => {
        const cont = document.getElementById('vc-online-friends');
        cont.innerHTML = '';
        for (const fid of state.friends) {
          const f = await appController.getUser(fid);
          const div = document.createElement('div');
          div.className = 'user-card';
          div.innerHTML = `<span>${f.icon} ${f.name}</span><input type="checkbox" value="${fid}" class="vc-inv-check">`;
          cont.appendChild(div);
        }
      },

      createVoiceRoom: async () => {
        const roomId = push(ref(db, 'voiceRooms')).key;
        const checks = document.querySelectorAll('.vc-inv-check:checked');
        await set(ref(db, `voiceRooms/${roomId}`), {
          host: state.userId,
          members: { [state.userId]: true }
        });
        checks.forEach(c => {
          push(ref(db, `invitations/${c.value}`), { from: state.userId, roomId });
        });
        state.voiceRoomId = roomId;
        appController.enterVoiceRoom();
      },

      enterVoiceRoom: () => {
        document.getElementById('vc-setup-area').classList.add('hidden');
        document.getElementById('vc-room-area').classList.remove('hidden');
        if (state.recognition) state.recognition.start();

        // メンバー表示
        onValue(ref(db, `voiceRooms/${state.voiceRoomId}/members`), async (snap) => {
          const list = document.getElementById('vc-member-list');
          list.innerHTML = '';
          if (!snap.exists()) return;
          for (const mid of Object.keys(snap.val())) {
            const m = await appController.getUser(mid);
            const div = document.createElement('div');
            div.style.padding = '10px';
            div.innerHTML = `${m.icon} ${m.name}`;
            list.appendChild(div);
          }
        });

        // ボイスチャット履歴 (リアルタイム記録)
        const vLogRef = query(ref(db, `voiceRooms/${state.voiceRoomId}/messages`), limitToLast(50));
        onValue(vLogRef, async (snap) => {
          const hist = document.getElementById('vc-history-log');
          hist.innerHTML = '';
          if (!snap.exists()) return;
          
          const msgs = Object.entries(snap.val());
          for (const [mid, m] of msgs) {
            const sender = await appController.getUser(m.sender);
            const isSelf = m.sender === state.userId;
            
            const row = document.createElement('div');
            row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
            row.innerHTML = `
              <div class="message-block">
                <div class="msg-icon" style="font-size:24px;">${sender.icon}</div>
                <div class="msg-bubble" style="font-size:14px; padding:5px 12px;">${m.text}</div>
              </div>
            `;
            hist.appendChild(row);

            // 最後に届いた「自分以外」の声を再生
            if (!isSelf && mid === msgs[msgs.length - 1][0] && state.lastSpokenId !== mid) {
              state.lastSpokenId = mid;
              appController.playVoice(m.text, sender.voiceSettings);
            }
          }
          hist.scrollTop = hist.scrollHeight;
        });
      },

      sendVoiceLog: (text) => {
        push(ref(db, `voiceRooms/${state.voiceRoomId}/messages`), {
          sender: state.userId,
          text,
          timestamp: serverTimestamp()
        });
      },

      playVoice: (text, settings) => {
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'ja-JP';
        ut.pitch = settings.pitch || 1.0;
        ut.rate = settings.rate || 1.0;
        ut.volume = settings.volume || 1.0;
        window.speechSynthesis.speak(ut);
      },

      testVoice: () => {
        appController.playVoice("これはテストです。声の高さはどうですか？", state.userData.voiceSettings);
      },

      // ヘルパー
      getUser: async (uid) => {
        if (state.usersCache[uid]) return state.usersCache[uid];
        const snap = await get(ref(db, `users/${uid}`));
        const data = snap.val();
        state.usersCache[uid] = data;
        return data;
      },

      acceptInvitation: async () => {
        const { roomId, key } = state.activeInv;
        await update(ref(db, `voiceRooms/${roomId}/members`), { [state.userId]: true });
        await remove(ref(db, `invitations/${state.userId}/${key}`));
        state.voiceRoomId = roomId;
        appController.switchView('voice');
        appController.enterVoiceRoom();
      },

      declineInvitation: async () => {
        await remove(ref(db, `invitations/${state.userId}/${state.activeInv.key}`));
      },

      toggleMic: () => {
        state.isMicOn = !state.isMicOn;
        const btn = document.getElementById('mic-toggle-btn');
        if (state.isMicOn) {
          btn.innerText = "🎤 マイク ON";
          btn.className = "primary-btn";
          if (state.recognition) state.recognition.start();
        } else {
          btn.innerText = "🔇 マイク OFF";
          btn.className = "danger-btn";
          if (state.recognition) state.recognition.stop();
        }
      },

      leaveVoiceRoom: async () => {
        if (!confirm("退室しますか？")) return;
        await remove(ref(db, `voiceRooms/${state.voiceRoomId}/members/${state.userId}`));
        state.voiceRoomId = null;
        if (state.recognition) state.recognition.stop();
        appController.switchView('voice');
        document.getElementById('vc-room-area').classList.add('hidden');
        document.getElementById('vc-setup-area').classList.remove('hidden');
      }
    };

    window.onload = appController.init;
    window.appController = appController;
  </script>
</body>
</html>
